<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>Resize Image</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Resize Image</h1>

<p>Resize your image by width and height.</p>

<div id="drop-area" class="upload">

<p>Drag & Drop image here</p>

<input type="file" id="upload">

</div>

<img id="preview" style="display:none;width:100%;margin-top:15px;border-radius:8px;">

<br>

<label>Width (px)</label> <br> <input id="width" type="number" placeholder="800">

<br><br>

<label>Height (px)</label> <br> <input id="height" type="number" placeholder="800">

<br><br>

<label>Preset sizes</label>

<br>

<select id="preset" onchange="applyPreset()">

<option value="">Choose preset</option>
<option value="205x205">205 x 205</option>
<option value="400x400">400 x 400</option>
<option value="800x800">800 x 800</option>
<option value="1024x1024">1024 x 1024</option>
<option value="1920x1080">1920 x 1080</option>

</select>

<br><br>

<button onclick="resizeImage()">Resize Image</button>

<br>

<a id="download">Download Image</a>

</div>

<script src="script.js"></script>

</body>
</html>

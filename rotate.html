<div class="container">

<h1>Rotate Image</h1>

<p>Rotate your image interactively.</p>

<div id="drop-area" class="upload">

<p>Drag & Drop image here</p>

<input type="file" id="upload">

</div>

<img id="preview" style="display:none;width:100%;margin-top:15px;border-radius:8px;transition:0.2s;">

<br><br>

<label>Rotation Angle</label>

<br>

<input type="range" id="rotateSlider" min="0" max="360" value="0">

<br>

<span id="angleValue">0°</span>

<br><br>

<select id="rotationPreset" onchange="setRotationPreset()">

<option value="">Quick rotation</option>
<option value="90">90°</option>
<option value="180">180°</option>
<option value="270">270°</option>

</select>

<br><br>

<button onclick="rotateImage()">Download Rotated Image</button>

<br>

<a id="download">Download Image</a>

</div>

<script src="script.js"></script>

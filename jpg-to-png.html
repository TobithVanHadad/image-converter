<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>JPG to PNG</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>JPG to PNG</h1>

<p>Convert JPG images to PNG format.</p>

<div id="drop-area" class="upload">

<p>Drag & Drop JPG image here</p>

<input type="file" id="upload">

</div>

<img id="preview" style="display:none;width:100%;margin-top:15px;border-radius:8px;">

<br>

<button onclick="jpgToPng()">Convert to PNG</button>

<br>

<a id="download">Download PNG</a>

</div>

<script src="script.js"></script>

</body>

</html>

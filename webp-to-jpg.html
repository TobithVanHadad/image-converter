<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>WEBP to JPG</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>WEBP to JPG</h1>

<p>Convert WEBP images to JPG format.</p>

<div id="drop-area" class="upload">

<p>Drag & Drop WEBP image here</p>

<input type="file" id="upload">

</div>

<img id="preview" style="display:none;width:100%;margin-top:15px;border-radius:8px;">

<br>

<button onclick="webpToJpg()">Convert to JPG</button>

<br>

<a id="download">Download JPG</a>

</div>

<script src="script.js"></script>

</body>

</html>

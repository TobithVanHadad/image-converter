<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Convert Image</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Convert Image</h1>

<p>Convert your images to PNG, JPG or WEBP.</p>

<div id="drop-area" class="upload">

<p>Drag & Drop image here</p>

<input type="file" id="upload">

</div>

<img id="preview" style="display:none;width:100%;margin-top:15px;border-radius:8px;">

<select id="format">

<option value="image/png">PNG</option>
<option value="image/jpeg">JPG</option>
<option value="image/webp">WEBP</option>

</select>

<br>

<button onclick="convertImage()">Convert Image</button>

<br>

<a id="download">Download Image</a>

</div>


<script src="script.js"></script>  
  
</body>

</html>

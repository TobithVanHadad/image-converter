<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Convert Image</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#f8fafc;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1e293b;
padding:40px;
border-radius:12px;
width:420px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

h1{
margin-bottom:10px;
}

p{
color:#94a3b8;
margin-bottom:20px;
}

.upload{
border:2px dashed #475569;
padding:30px;
border-radius:10px;
margin-bottom:20px;
cursor:pointer;
}

.upload:hover{
border-color:#6366f1;
}

select{
padding:10px;
border-radius:6px;
border:none;
margin-bottom:20px;
}

button{
background:#6366f1;
border:none;
padding:14px 28px;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}

#download{
display:none;
margin-top:20px;
color:#22c55e;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Convert Image</h1>

<p>Convert your images to PNG, JPG or WEBP.</p>

<div class="upload">
<input type="file" id="upload">
</div>

<select id="format">

<option value="image/png">PNG</option>
<option value="image/jpeg">JPG</option>
<option value="image/webp">WEBP</option>

</select>

<br>

<button onclick="convertImage()">Convert Image</button>

<br>

<a id="download">Download Image</a>

</div>

<script>

function convertImage(){

let file=document.getElementById("upload").files[0]

if(!file){
alert("Upload an image first")
return
}

let format=document.getElementById("format").value

let img=new Image()

img.src=URL.createObjectURL(file)

img.onload=function(){

let canvas=document.createElement("canvas")

canvas.width=img.width
canvas.height=img.height

let ctx=canvas.getContext("2d")

ctx.drawImage(img,0,0)

let converted=canvas.toDataURL(format)

let link=document.getElementById("download")

link.href=converted
link.download="converted-image"
link.style.display="block"
link.innerText="Download Image"

}

}

</script>

</body>

</html>
